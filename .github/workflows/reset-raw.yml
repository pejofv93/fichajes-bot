name: Reset raw — marcar procesado=0 últimos 30 días

on:
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  reset-raw:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install uv
        run: pip install uv --quiet

      - name: Install dependencies
        run: uv pip install --system -r requirements.lock --quiet && uv pip install --system -e . --quiet

      - name: Reset procesado=0 for last 30 days
        run: python scripts/reset_raw.py
