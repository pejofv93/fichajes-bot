name: Deploy Cloudflare Worker + Set Webhook

on:
  push:
    branches: [main]
    paths:
      - 'workers/telegram-bot/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Worker deps
        working-directory: workers/telegram-bot
        run: npm ci

      - name: Deploy Worker via wrangler
        working-directory: workers/telegram-bot
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Telegram Webhook
        run: |
          WORKER_URL="https://fichajes-bot-telegram.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
            -d "url=${WORKER_URL}" \
            -d "drop_pending_updates=true" | jq .
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
